        async function sendMessage() {
            if (isGenerating) return;
            let text = userInput.value.trim();
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            
            let userDisplayText = text;
            if (currentAttachment) {
                const attachmentInfo = `\n\n【用户上传了文件：${currentAttachment.name}，内容如下】\n\`\`\`\n${currentAttachment.content}\n\`\`\`\n请仅基于以上文件内容回答。\n`;
                if (!text) text = `请分析文件内容：${currentAttachment.name}`;
                userDisplayText = text + `\n\n📎 已上传附件: ${currentAttachment.name}`;
                text = attachmentInfo + text;
                chat.messages.push({ role: 'user', content: userDisplayText });
                if (chat.messages.length === 1) chat.title = userDisplayText.slice(0, 20);
                await saveChat(chat);
                await appendMessageToDOM('user', userDisplayText);
            } else if (text) {
                chat.messages.push({ role: 'user', content: text });
                if (chat.messages.length === 1) chat.title = text.slice(0, 20);
                await saveChat(chat);
                await appendMessageToDOM('user', text);
            } else {
                return;
            }
            
            userInput.value = '';
            userInput.style.height = 'auto';
            if (currentAttachment) {
                currentAttachment = null;
                attachmentArea.innerHTML = '';
            }
            setGeneratingState(true);
            userScrolled = false;
            clearMessageSelection();
            forceScrollToBottom();
            
            let fullResponse = "";
            let contentDiv = null;
            let isAborted = false;
            
            const aiContentDiv = appendMessageToDOMSync('ai', '', (div) => {
                contentDiv = div;
                const loadingSpan = document.createElement('div');
                loadingSpan.className = 'typing-indicator';
                loadingSpan.innerHTML = '<span></span><span></span><span></span>';
                div.appendChild(loadingSpan);
            });
            
            const actualMessages = [...chat.messages];
            const systemPrompt = getSystemPrompt();
            const prompt = buildPromptWithLimit(actualMessages, systemPrompt, MAX_CONTEXT_TOKENS);
            
            abortController = new AbortController();
            
            try {
                await streamCompletion(prompt, 
                    async (token) => {
                        if (abortController?.signal.aborted) {
                            isAborted = true;
                            return;
                        }
                        fullResponse += token;
                        if (contentDiv) {
                            const loading = contentDiv.querySelector('.typing-indicator');
                            if (loading) loading.remove();
                            const rendered = await getCachedMessage(fullResponse);
                            contentDiv.innerHTML = rendered;
                            contentDiv.setAttribute('data-raw-text', fullResponse);
                            renderMath(contentDiv);
                            addCopyButtonsToCodeBlocks();
                        }
                        scrollToBottom();
                    },
                    (error) => {
                        console.error('Stream error:', error);
                        if (contentDiv && !abortController?.signal.aborted) {
                            const loading = contentDiv.querySelector('.typing-indicator');
                            if (loading) loading.remove();
                            contentDiv.innerHTML = `❌ 错误: ${error.message}`;
                            contentDiv.setAttribute('data-raw-text', `错误: ${error.message}`);
                        }
                    },
                    () => {
                        isAborted = true;
                        if (contentDiv) {
                            const loading = contentDiv.querySelector('.typing-indicator');
                            if (loading) loading.remove();
                            if (!fullResponse) {
                                contentDiv.innerHTML = `⏹️ 已停止生成`;
                                contentDiv.setAttribute('data-raw-text', `已停止生成`);
                            }
                        }
                    }
                );
                
                if (isAborted) {
                    if (contentDiv && !fullResponse) {
                        const loading = contentDiv.querySelector('.typing-indicator');
                        if (loading) loading.remove();
                    }
                } else if (fullResponse) {
                    chat.messages.push({ role: 'assistant', content: fullResponse });
                    await saveChat(chat);
                    if (contentDiv) {
                        const loading = contentDiv.querySelector('.typing-indicator');
                        if (loading) loading.remove();
                        const rendered = await getCachedMessage(fullResponse);
                        contentDiv.innerHTML = rendered;
                        contentDiv.setAttribute('data-raw-text', fullResponse);
                        renderMath(contentDiv);
                        addCopyButtonsToCodeBlocks();
                    }
                    autoSpeakIfEnabled();
                } else {
                    throw new Error('无响应');
                }
            } catch(error) {
                if (!isAborted && contentDiv) {
                    const loading = contentDiv.querySelector('.typing-indicator');
                    if (loading) loading.remove();
                    contentDiv.innerHTML = `❌ 错误: ${error.message}`;
                    contentDiv.setAttribute('data-raw-text', `错误: ${error.message}`);
                    renderMath(contentDiv);
                }
                if (!isAborted) {
                    showToast(`请求失败: ${error.message}`);
                }
            } finally {
                setGeneratingState(false);
                abortController = null;
                userInput.focus();
                updateContinueButtonState();
                attachCopyButtons();
            }
        }
        
        async function continueGeneration() {
            if (isGenerating) {
                showToast('请等待完成');
                return;
            }
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat || chat.messages.length === 0 || chat.messages[chat.messages.length - 1].role !== 'assistant') {
                showToast('无可继续内容');
                return;
            }
            
            setGeneratingState(true);
            userScrolled = false;
            
            const aiDivs = Array.from(document.querySelectorAll('.message')).filter(d => d.querySelector('.avatar.ai'));
            const targetDiv = aiDivs[aiDivs.length - 1];
            let contentDiv = targetDiv?.querySelector('.content');
            const existing = chat.messages[chat.messages.length - 1].content;
            
            if (contentDiv) {
                const loadingSpan = document.createElement('div');
                loadingSpan.className = 'typing-indicator';
                loadingSpan.innerHTML = '<span></span><span></span><span></span>';
                contentDiv.appendChild(loadingSpan);
            }
            scrollToBottom();
            
            const systemPrompt = getSystemPrompt();
            const historyMsgs = chat.messages.slice(0, -1);
            let fullHistory = systemPrompt;
            for (const msg of historyMsgs) {
                fullHistory += `<|im_start|>${msg.role}\n${msg.content}<|im_end|>\n`;
            }
            const prompt = fullHistory + `<|im_start|>assistant\n` + existing;
            
            let newPart = "";
            let isAborted = false;
            abortController = new AbortController();
            
            try {
                await streamCompletion(prompt, 
                    async (token) => {
                        if (abortController?.signal.aborted) {
                            isAborted = true;
                            return;
                        }
                        newPart += token;
                        const fullResponse = existing + newPart;
                        if (contentDiv) {
                            const loading = contentDiv.querySelector('.typing-indicator');
                            if (loading) loading.remove();
                            const rendered = await getCachedMessage(fullResponse);
                            contentDiv.innerHTML = rendered;
                            contentDiv.setAttribute('data-raw-text', fullResponse);
                            renderMath(contentDiv);
                            addCopyButtonsToCodeBlocks();
                        }
                        scrollToBottom();
                    },
                    (error) => {
                        console.error('Continue error:', error);
                    },
                    () => {
                        isAborted = true;
                    }
                );
                
                const typing = contentDiv?.querySelector('.typing-indicator');
                if (typing) typing.remove();
                
                if (!isAborted && newPart.trim()) {
                    chat.messages[chat.messages.length - 1].content = existing + newPart;
                    await saveChat(chat);
                    if (contentDiv) {
                        const rendered = await getCachedMessage(existing + newPart);
                        contentDiv.innerHTML = rendered;
                        contentDiv.setAttribute('data-raw-text', existing + newPart);
                        renderMath(contentDiv);
                        addCopyButtonsToCodeBlocks();
                    }
                    showToast('继续完成');
                } else if (isAborted) {
                    showToast('已停止继续生成');
                }
            } catch(e) {
                const typing = contentDiv?.querySelector('.typing-indicator');
                if (typing) typing.remove();
                if (contentDiv && !isAborted) {
                    contentDiv.innerHTML = existing + `<br><span style="color:var(--danger-color);">❌ ${e.message}</span>`;
                    renderMath(contentDiv);
                }
                if (!isAborted) {
                    showToast(`继续生成失败: ${e.message}`);
                }
            } finally {
                setGeneratingState(false);
                abortController = null;
                userInput.focus();
                attachCopyButtons();
            }
        }
        
        function updateContinueButtonState() {
            if (!currentChatId || isGenerating) {
                continueBtn.disabled = true;
                return;
            }
            const chat = chats.find(c => c.id === currentChatId);
            continueBtn.disabled = !(chat && chat.messages.length > 0 && chat.messages[chat.messages.length - 1].role === 'assistant');
        }
        
        // ==================== 文件处理 ====================
        function handleFileUpload(files) {
            if (!files || files.length === 0) return;
            const file = files[0];
            if (file.size > CONFIG.MAX_FILE_SIZE) {
                showToast('文件大小不能超过5MB');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                let rawContent = e.target.result;
                rawContent = rawContent.slice(0, 8000);
                rawContent = rawContent.replace(/<\|im_start\|>|<\|im_end\|>/g, '');
                const safeContent = typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(rawContent, { ALLOWED_TAGS: [] }) : rawContent;
                currentAttachment = { name: file.name, content: safeContent, type: file.type };
                attachmentArea.innerHTML = `<div class="attachment-preview"><span>📄</span><span>${escapeHtml(file.name)}</span><button class="remove-attach" onclick="removeAttachment()">✕</button></div>`;
                autoResize(userInput);
                if (!isGenerating) sendBtn.disabled = false;
                showToast(`已添加附件: ${file.name}`);
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        function removeAttachment() {
            currentAttachment = null;
            attachmentArea.innerHTML = '';
            autoResize(userInput);
            if (!isGenerating && userInput.value.trim() === '') sendBtn.disabled = true;
            showToast('已移除附件');
        }
        
        async function checkServerStatus() {
            try {
                let testSuccess = false;
                const baseUrl = API_URL.replace(/\/+$/, '');
                
                if (API_TYPE === 'ollama') {
                    try {
                        const response = await fetchWithRetry(`${baseUrl}/api/tags`, { method: 'GET' }, 1);
                        testSuccess = response.ok;
                    } catch(e) {}
                } else if (API_TYPE === 'llama') {
                    try {
                        const response = await fetchWithRetry(`${baseUrl}/health`, { method: 'GET' }, 1);
                        testSuccess = response.ok;
                    } catch(e) {
                        try {
                            const response = await fetchWithRetry(`${baseUrl}/completion`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ prompt: "test", n_predict: 1, stream: false })
                            }, 1);
                            testSuccess = response.ok || response.status === 400;
                        } catch(e2) {}
                    }
                } else if (API_TYPE === 'openai') {
                    try {
                        const response = await fetchWithRetry(`${baseUrl}/v1/models`, { method: 'GET' }, 1);
                        testSuccess = response.ok;
                    } catch(e) {}
                }
                
                if (testSuccess) {
                    statusDot.classList.add('online');
                    statusDot.classList.remove('error', 'checking');
                    statusText.innerText = '✅ 服务在线';
                    if (!isGenerating) sendBtn.disabled = userInput.value.trim() === '' && !currentAttachment;
                } else {
                    throw new Error('服务无响应');
                }
            } catch(e) {
                statusDot.classList.remove('online', 'checking');
                statusDot.classList.add('error');
                if (API_TYPE === 'llama') {
                    statusText.innerText = '❌ llama.cpp 未启动\n请运行: ./server -m model.gguf';
                } else if (API_TYPE === 'ollama') {
                    statusText.innerText = '❌ Ollama 未启动\n请运行: ollama serve';
                } else {
                    statusText.innerText = '❌ 服务未启动';
                }
                sendBtn.disabled = true;
            }
        }
        
        async function testConnection() {
            statusDot.classList.remove('online', 'error');
            statusDot.classList.add('checking');
            statusText.innerText = '检测中...';
            sendBtn.disabled = true;
            try {
                await checkServerStatus();
                if (statusDot.classList.contains('online')) {
                    showToast('✅ 连接成功！');
                } else {
                    showToast('❌ 连接失败');
                }
            } catch(e) {
                showToast('检测失败');
            } finally {
                statusDot.classList.remove('checking');
            }
        }
        
        // ==================== 设置管理 ====================
        function persistAllSettings() {
            const settings = {
                apiUrl: API_URL,
                apiType: API_TYPE,
                modelName: MODEL_NAME,
                modelParams: { ...MODEL_PARAMS },
                maxContext: MAX_CONTEXT_TOKENS
            };
            localStorage.setItem(CONFIG.STORAGE_KEYS.SETTINGS, JSON.stringify(settings));
        }
        
        function bindAutoSaveEvents() {
            const elements = ['temperature', 'maxTokens', 'topP', 'contextLimit', 'apiUrl', 'modelName'];
            elements.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('change', () => {
                        syncSettingsFromUI();
                        persistAllSettings();
                    });
                    if (el.type === 'range') {
                        el.addEventListener('input', () => {
                            const spanId = id === 'temperature' ? 'tempValue' : (id === 'topP' ? 'topPValue' : null);
                            if (spanId) document.getElementById(spanId).textContent = el.value;
                        });
                    }
                }
            });
        }
        
        function syncSettingsFromUI() {
            MODEL_PARAMS = {
                max_tokens: parseInt(document.getElementById('maxTokens').value),
                temperature: parseFloat(document.getElementById('temperature').value),
                top_p: parseFloat(document.getElementById('topP').value)
            };
            MAX_CONTEXT_TOKENS = parseInt(document.getElementById('contextLimit').value);
            API_URL = document.getElementById('apiUrl').value;
            if (API_TYPE === 'ollama') MODEL_NAME = document.getElementById('modelName').value;
            document.getElementById('contextSize').innerText = MAX_CONTEXT_TOKENS;
        }
        
        function setApiType(type) {
            API_TYPE = type;
            document.getElementById('apiLlama').classList.remove('active');
            document.getElementById('apiOllama').classList.remove('active');
            document.getElementById('ApiOpenAI').classList.remove('active');
            if (type === 'llama') {
                document.getElementById('apiLlama').classList.add('active');
                if (document.getElementById('apiUrl').value === 'http://127.0.0.1:11434' || document.getElementById('apiUrl').value === 'https://api.openai.com/v1') 
                    document.getElementById('apiUrl').value = 'http://127.0.0.1:8080';
            }
            if (type === 'ollama') {
                document.getElementById('apiOllama').classList.add('active');
                if (document.getElementById('apiUrl').value === 'http://127.0.0.1:8080' || document.getElementById('apiUrl').value === 'https://api.openai.com/v1')
                    document.getElementById('apiUrl').value = 'http://127.0.0.1:11434';
            }
            if (type === 'openai') {
                document.getElementById('ApiOpenAI').classList.add('active');
                if (document.getElementById('apiUrl').value === 'http://127.0.0.1:8080' || document.getElementById('apiUrl').value === 'http://127.0.0.1:11434')
                    document.getElementById('apiUrl').value = 'https://api.openai.com/v1';
            }
            const modelLabel = document.getElementById('modelNameLabel');
            modelLabel.style.display = type === 'ollama' ? 'block' : 'none';
            document.getElementById('apiUrl').value = API_URL;
            syncSettingsFromUI();
            persistAllSettings();
            setTimeout(() => checkServerStatus(), 500);
        }
        
        function saveSettings() {
            syncSettingsFromUI();
            persistAllSettings();
            saveVoiceSettings();
            closeSettings();
            showToast('设置已保存');
            setTimeout(() => checkServerStatus(), 500);
        }
        
        function loadSettings() {
            const saved = localStorage.getItem(CONFIG.STORAGE_KEYS.SETTINGS);
            if (saved) {
                const s = JSON.parse(saved);
                API_URL = s.apiUrl || API_URL;
                API_TYPE = s.apiType || 'llama';
                MODEL_NAME = s.modelName || 'qwen2.5:7b';
                MODEL_PARAMS = s.modelParams || CONFIG.DEFAULT_MODEL_PARAMS;
                MAX_CONTEXT_TOKENS = s.maxContext || 8192;
            }
            setApiType(API_TYPE);
            document.getElementById('temperature').value = MODEL_PARAMS.temperature;
            document.getElementById('tempValue').textContent = MODEL_PARAMS.temperature;
            document.getElementById('maxTokens').value = MODEL_PARAMS.max_tokens;
            document.getElementById('topP').value = MODEL_PARAMS.top_p;
            document.getElementById('topPValue').textContent = MODEL_PARAMS.top_p;
            document.getElementById('apiUrl').value = API_URL;
            document.getElementById('contextLimit').value = MAX_CONTEXT_TOKENS;
            document.getElementById('modelName').value = MODEL_NAME;
            document.getElementById('contextSize').innerText = MAX_CONTEXT_TOKENS;
            loadVoiceSettings();
            loadVoices();
        }
        
        function openSettings() {
            document.getElementById('temperature').value = MODEL_PARAMS.temperature;
            document.getElementById('maxTokens').value = MODEL_PARAMS.max_tokens;
            document.getElementById('topP').value = MODEL_PARAMS.top_p;
            document.getElementById('contextLimit').value = MAX_CONTEXT_TOKENS;
            document.getElementById('apiUrl').value = API_URL;
            document.getElementById('modelName').value = MODEL_NAME;
            document.getElementById('tempValue').textContent = MODEL_PARAMS.temperature;
            document.getElementById('topPValue').textContent = MODEL_PARAMS.top_p;
            document.getElementById('settingsModal').style.display = 'flex';
        }
        
        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';
        }
        
        // ==================== 全局错误处理 ====================
        window.addEventListener('unhandledrejection', (e) => {
            console.error('未处理的Promise错误:', e.reason);
            if (e.reason?.name !== 'AbortError') {
                showToast('发生错误，请刷新页面重试');
            }
        });
        
        window.addEventListener('error', (e) => {
            console.error('全局错误:', e.error);
            if (e.message && !e.message.includes('ResizeObserver') && !e.message.includes('AbortError')) {
                showToast('页面发生错误，部分功能可能不可用');
            }
        });
        
        // ==================== 事件监听和初始化 ====================
        document.getElementById('temperature')?.addEventListener('input', (e) => {
            document.getElementById('tempValue').textContent = e.target.value;
        });
        document.getElementById('topP')?.addEventListener('input', (e) => {
            document.getElementById('topPValue').textContent = e.target.value;
        });
        document.getElementById('voiceRate')?.addEventListener('input', (e) => {
            document.getElementById('rateValue').textContent = e.target.value;
        });
        document.getElementById('voicePitch')?.addEventListener('input', (e) => {
            document.getElementById('pitchValue').textContent = e.target.value;
        });
        
        chatContainer.addEventListener('scroll', () => {
            userScrolled = chatContainer.scrollTop < chatContainer.scrollHeight - chatContainer.clientHeight - 50;
        });
        
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && sidebarEl.classList.contains('open') && !sidebarEl.contains(e.target) && !e.target.closest('.menu-toggle') && !e.target.closest('#sidebarOverlay')) {
                toggleSidebar();
            }
        });
        
        window.onload = async () => {
            if (localStorage.getItem(CONFIG.STORAGE_KEYS.THEME) === 'dark') document.body.classList.add('dark');
            loadSettings();
            bindAutoSaveEvents();
            await loadAllChats();
            checkServerStatus();
            setInterval(checkServerStatus, 30000);
            if (chats.length === 0) {
                await createNewChat();
            } else {
                await loadChat(chats[0].id);
            }
            updateContinueButtonState();
            updateChatCountDisplay();
            userInput.focus();
            loadVoices();
            handleKeyboard();
            attachCopyButtons();
            window.addEventListener('beforeunload', () => {
                if (typeof speechSynthesis !== 'undefined') speechSynthesis.cancel();
                if (currentStreamReader) {
                    try {
                        currentStreamReader.cancel();
                    } catch(e) {}
                }
            });
        };
        
        // 全局函数挂载
        window.toggleSidebar = toggleSidebar;
        window.toggleTheme = toggleTheme;
        window.openSettings = openSettings;
        window.closeSettings = closeSettings;
        window.saveSettings = saveSettings;
        window.createNewChat = createNewChat;
        window.exportChats = exportChats;
        window.importChats = importChats;
        window.renameChat = renameChat;
        window.deleteChat = deleteChat;
        window.loadChat = loadChat;
        window.handleSearchInput = handleSearchInput;
        window.sendMessage = sendMessage;
        window.stopGeneration = stopGeneration;
        window.continueGeneration = continueGeneration;
        window.copyMessage = copyMessage;
        window.handleFileUpload = handleFileUpload;
        window.removeAttachment = removeAttachment;
        window.autoResize = autoResize;
        window.handleEnter = handleEnter;
        window.setApiType = setApiType;
        window.testConnection = testConnection;
        window.checkServerStatus = checkServerStatus;
        window.toggleVoicePlayback = toggleVoicePlayback;
        window.stopSpeaking = stopSpeaking;
        window.testVoice = testVoice;
        window.speakMessage = speakMessage;
        window.toggleAutoSpeak = toggleAutoSpeak;
        window.saveVoiceSettings = saveVoiceSettings;
        window.loadVoices = loadVoices;
        window.showStorageDetail = showStorageDetail;
        window.quickCleanOldChats = quickCleanOldChats;
        window.renderMath = renderMath;
        window.forceScrollToBottom = forceScrollToBottom;
    </script>
</body>
</html>
